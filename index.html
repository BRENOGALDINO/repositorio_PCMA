<html lang="pt-BR">

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Base Normativa · PCMA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
<style>
:root {
  --preto: #0a0a0f;
  --preto-card: #13131a;
  --dourado: #c8a84b;
  --dourado-claro: #e2c97e;
  --dourado-escuro: #8a6f28;
  --azul-ma: #003087;
  --vermelho-ma: #c8102e;
  --branco: #f5f3ee;
  --cinza: #2a2a35;
  --cinza-borda: #2e2e3a;
  --cinza-texto: #8a8a9a;
  --texto: #e8e6e0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--preto);color:var(--texto);min-height:100vh}

/* HEADER */
header {
  background: linear-gradient(180deg, #000000 0%, #0d0d14 100%);
  border-bottom: 1px solid var(--cinza-borda);
  padding: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 32px rgba(0,0,0,0.6);
}
.header-inner {
  max-width: 960px;
  margin: 0 auto;
  padding: 20px 24px 0;
}
.header-top {
  display: flex;
  align-items: center;
  gap: 18px;
  margin-bottom: 20px;
}
.brasao {
  width: 56px;
  height: 56px;
  object-fit: contain;
  filter: drop-shadow(0 2px 8px rgba(200,168,75,0.4));
  flex-shrink: 0;
}
.header-texto {}
.header-eyebrow {
  font-size: 0.62rem;
  font-weight: 600;
  letter-spacing: 0.2em;
  color: var(--dourado);
  text-transform: uppercase;
  margin-bottom: 3px;
}
.header-titulo {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--branco);
  letter-spacing: -0.01em;
  line-height: 1.2;
}
.header-linha-dourada {
  height: 1px;
  background: linear-gradient(90deg, var(--dourado) 0%, transparent 60%);
  margin-bottom: 16px;
}

/* BUSCA */
.busca-wrap {
  position: relative;
  margin-bottom: 0;
}
.busca-icone {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--dourado);
  font-size: 1rem;
  pointer-events: none;
}
#busca {
  width: 100%;
  padding: 14px 16px 14px 46px;
  background: var(--cinza);
  border: 1px solid var(--cinza-borda);
  border-bottom: none;
  border-radius: 8px 8px 0 0;
  color: var(--branco);
  font-size: 0.92rem;
  font-family: 'Inter', sans-serif;
  outline: none;
  transition: border-color 0.2s;
}
#busca::placeholder { color: var(--cinza-texto); }
#busca:focus { border-color: var(--dourado-escuro); }

/* ABAS */
.abas {
  display: flex;
  gap: 2px;
  margin-top: 8px;
}
.aba {
  padding: 9px 20px;
  background: transparent;
  color: var(--cinza-texto);
  border: none;
  border-radius: 6px 6px 0 0;
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  letter-spacing: 0.02em;
  transition: all 0.15s;
}
.aba.ativa {
  background: var(--preto);
  color: var(--dourado);
  font-weight: 700;
  border-top: 2px solid var(--dourado);
}

/* MAIN */
main { max-width: 960px; margin: 0 auto; padding: 28px 24px 60px; }

/* FILTROS */
.filtros {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 28px;
}
.fb {
  padding: 5px 14px;
  border-radius: 99px;
  border: 1px solid var(--cinza-borda);
  background: transparent;
  color: var(--cinza-texto);
  font-size: 0.75rem;
  font-weight: 500;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: all 0.15s;
}
.fb:hover { border-color: var(--dourado-escuro); color: var(--dourado-claro); }
.fb.ativo {
  background: var(--dourado);
  color: var(--preto);
  border-color: var(--dourado);
  font-weight: 700;
}

/* SECOES */
.secao { margin-bottom: 32px; }
.sh {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
  cursor: pointer;
  background: none;
  border: none;
  width: 100%;
  text-align: left;
}
.sh-icone { font-size: 1.1rem; }
.sh-titulo { font-weight: 700; font-size: 0.92rem; color: var(--dourado-claro); letter-spacing: 0.04em; text-transform: uppercase; }
.sh-count {
  background: var(--cinza);
  color: var(--cinza-texto);
  border-radius: 99px;
  font-size: 0.68rem;
  font-weight: 700;
  padding: 2px 9px;
  border: 1px solid var(--cinza-borda);
}
.sh-toggle { margin-left: auto; color: var(--cinza-texto); font-size: 0.75rem; }
.sh-linha {
  height: 1px;
  background: linear-gradient(90deg, var(--dourado-escuro) 0%, var(--cinza-borda) 30%, transparent 100%);
  margin-bottom: 14px;
}
.sd { display: flex; flex-direction: column; gap: 10px; }
.sd.fechado { display: none; }

/* CARDS */
.card {
  background: var(--preto-card);
  border: 1px solid var(--cinza-borda);
  border-left: 3px solid var(--dourado-escuro);
  border-radius: 8px;
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: border-color 0.15s, box-shadow 0.15s;
  cursor: default;
}
.card:hover {
  border-color: var(--dourado);
  box-shadow: 0 4px 24px rgba(200,168,75,0.12);
}
.card-topo {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
}
.card-titulo {
  font-weight: 600;
  font-size: 0.88rem;
  color: var(--branco);
  line-height: 1.45;
}
.card-meta { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
.badge {
  font-size: 0.6rem;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  white-space: nowrap;
}
.ano { font-size: 0.72rem; color: var(--cinza-texto); font-weight: 500; }
.trecho {
  font-size: 0.77rem;
  color: var(--cinza-texto);
  line-height: 1.6;
  font-style: italic;
  background: rgba(255,255,255,0.03);
  padding: 8px 12px;
  border-radius: 4px;
  border-left: 2px solid var(--dourado-escuro);
}
mark {
  background: rgba(200,168,75,0.25);
  color: var(--dourado-claro);
  border-radius: 2px;
  padding: 0 2px;
}
.card-rodape { display: flex; justify-content: flex-end; margin-top: 4px; }
.btn-abrir {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: transparent;
  color: var(--dourado);
  border: 1px solid var(--dourado-escuro);
  border-radius: 5px;
  padding: 7px 16px;
  font-size: 0.75rem;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  letter-spacing: 0.04em;
  text-decoration: none;
  transition: all 0.15s;
}
.btn-abrir:hover {
  background: var(--dourado);
  color: var(--preto);
  border-color: var(--dourado);
}

/* RESULTADO */
.ri { font-size: 0.82rem; color: var(--cinza-texto); margin-bottom: 20px; }
.ri strong { color: var(--dourado-claro); }
.vazio { text-align: center; color: var(--cinza-texto); margin-top: 60px; font-size: 0.9rem; }
.carregando { text-align: center; color: var(--cinza-texto); margin-top: 48px; font-size: 0.85rem; }

/* FOOTER */
footer {
  text-align: center;
  padding: 24px;
  font-size: 0.68rem;
  color: var(--cinza-texto);
  border-top: 1px solid var(--cinza-borda);
  letter-spacing: 0.05em;
}
footer span { color: var(--dourado-escuro); }

/* BANDEIRA MA — detalhe sutil no header */
.ma-stripe {
  height: 3px;
  background: linear-gradient(90deg, var(--azul-ma) 0%, var(--azul-ma) 33%, #fff 33%, #fff 66%, var(--vermelho-ma) 66%);
  opacity: 0.35;
}

@media (max-width: 600px) {
  .header-titulo { font-size: 1.1rem; }
  .brasao { width: 44px; height: 44px; }
  main { padding: 20px 16px 48px; }
}
</style>
</head>

<div class="ma-stripe"></div>

<header>
  <div class="header-inner">
    <div class="header-top">
      <img class="brasao" src="https://raw.githubusercontent.com/BRENOGALDINO/reposiorio_PCMA/main/brasao_pcma.png" alt="Brasão PCMA" onerror="this.style.display='none'"/>
      <div class="header-texto">
        <div class="header-eyebrow">Polícia Civil do Maranhão</div>
        <div class="header-titulo">Base Normativa · PCMA</div>
      </div>
    </div>
    <div class="header-linha-dourada"></div>
    <div class="busca-wrap">
      <span class="busca-icone">⌕</span>
      <input id="busca" type="text" placeholder="Pesquise qualquer palavra em todos os documentos..." oninput="onB()"/>
    </div>
    <div class="abas">
      <button class="aba ativa" id="at" onclick="setA('t')">Por Tema</button>
      <button class="aba" id="ab" onclick="setA('b')">Resultados da Busca</button>
    </div>
  </div>
</header>

<main>
  <div class="filtros" id="filtros"></div>
  <div id="conteudo"><p class="carregando">Carregando acervo...</p></div>
</main>

<footer>
  <span>PCMA</span> · Base Normativa Interna · Uso restrito · 2025
</footer>

var textos={};
var tipos=["Todos"];
DOCS.forEach(function(d){if(tipos.indexOf(d.tp)<0)tipos.push(d.tp);});
var aba="t",filtro="Todos",textoCarregado=false;

fetch("https://brenogaldino.github.io/reposiorio_PCMA/textos_limpo.json")
  .then(function(r){return r.json();})
  .then(function(data){textos=data;textoCarregado=true;render();})
  .catch(function(){textoCarregado=true;render();});

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function hlText(txt,q){
  if(!q)return esc(txt);
  var r="",j=0,tl=txt.toLowerCase(),ql=q.toLowerCase(),len=ql.length;
  while(j<txt.length){var k=tl.indexOf(ql,j);if(k<0){r+=esc(txt.slice(j));break;}r+=esc(txt.slice(j,k))+"<mark>"+esc(txt.slice(k,k+len))+"</mark>";j=k+len;}
  return r;
}
function trechoTexto(txt,q){
  if(!txt||!q)return "";
  var tl=txt.toLowerCase(),ql=q.toLowerCase(),i=tl.indexOf(ql);
  if(i<0)return "";
  var a=Math.max(0,i-90),b=Math.min(txt.length,i+q.length+90);
  return hlText((a>0?"...":"")+txt.slice(a,b)+(b<txt.length?"...":""),q);
}
function getFiltrados(){
  var q=document.getElementById("busca").value.trim().toLowerCase();
  return DOCS.filter(function(d){
    if(filtro!=="Todos"&&d.tp!==filtro)return false;
    if(!q)return true;
    var txt=textos[decodeURIComponent(d.f)]||"";
    return d.t.toLowerCase().indexOf(q)>=0||d.tm.toLowerCase().indexOf(q)>=0||d.tp.toLowerCase().indexOf(q)>=0||String(d.a).indexOf(q)>=0||txt.indexOf(q)>=0;
  });
}
function card(d,q){
  var cor=COR[d.tp]||"#2a2a35";
  var ct=COR_TEXTO[d.tp]||"#9ca3af";
  var txt=textos[decodeURIComponent(d.f)]||"";
  var tr=trechoTexto(txt,q);
  return '<div class="card"><div class="card-topo"><span class="card-titulo">'+hlText(d.t,q)+'</span><div class="card-meta"><span class="badge" style="background:'+cor+';color:'+ct+'">'+esc(d.tp)+'</span><span class="ano">'+d.a+'</span></div></div>'+(tr?'<div class="trecho">'+tr+'</div>':"")+'<div class="card-rodape"><a class="btn-abrir" href="'+BASE+d.f+'" target="_blank">&#128196; Abrir documento</a></div></div>';
}
function rFiltros(){
  document.getElementById("filtros").innerHTML=tipos.map(function(t){
    return'<button class="fb'+(filtro===t?" ativo":"")+'" onclick="setF(\''+t+'\')">'+esc(t)+"</button>";
  }).join("");
}
function setF(t){filtro=t;rFiltros();render();}
function setA(a){
  aba=a;
  document.getElementById("at").className="aba"+(a==="t"?" ativa":"");
  document.getElementById("ab").className="aba"+(a==="b"?" ativa":"");
  render();
}
function onB(){
  var v=document.getElementById("busca").value.trim();
  if(v)setA("b");else setA("t");
  render();
}
function render(){
  if(!textoCarregado){document.getElementById("conteudo").innerHTML='<p class="carregando">Carregando acervo...</p>';return;}
  var q=document.getElementById("busca").value.trim();
  var ds=getFiltrados();
  var el=document.getElementById("conteudo");
  document.getElementById("ab").textContent="Resultados da Busca"+(q?" ("+ds.length+")":"");
  if(aba==="t"&&!q){
    var m={};ds.forEach(function(d){if(!m[d.tm])m[d.tm]=[];m[d.tm].push(d);});
    var temas=Object.keys(m);
    if(!temas.length){el.innerHTML='<p class="vazio">Nenhum documento encontrado.</p>';return;}
    el.innerHTML=temas.map(function(tm){
      return'<div class="secao"><button class="sh" onclick="tog(this)"><span class="sh-icone">'+(ICO[tm]||"📄")+'</span><span class="sh-titulo">'+esc(tm)+'</span><span class="sh-count">'+m[tm].length+'</span><span class="sh-toggle">▲</span></button><div class="sh-linha"></div><div class="sd">'+m[tm].map(function(d){return card(d,"");}).join("")+"</div></div>";
    }).join("");
  } else {
    if(!ds.length){el.innerHTML='<p class="vazio">Nenhum resultado para "'+esc(q)+'".</p>';return;}
    el.innerHTML='<p class="ri">'+ds.length+' documento'+(ds.length>1?"s":"")+" encontrado"+(ds.length>1?"s":"")+" para <strong>"+esc(q)+"</strong></p>"+ds.map(function(d){return card(d,q);}).join("");
  }
}
function tog(btn){
  var sd=btn.parentElement.querySelector(".sd");
  sd.classList.toggle("fechado");
  btn.querySelector(".sh-toggle").textContent=sd.classList.contains("fechado")?"▼":"▲";
}
rFiltros();render();
</script>
