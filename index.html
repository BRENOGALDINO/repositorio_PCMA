<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Repositório de Atos Normativos – PCMA</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f0f2f5;
    color: #1a1a2e;
    min-height: 100vh;
  }

  /* CABEÇALHO */
  header {
    background: linear-gradient(135deg, #0d1b2a 0%, #1b3a5c 60%, #22577a 100%);
    padding: 32px 24px 0;
    color: #fff;
  }
  .header-inner { max-width: 900px; margin: 0 auto; }
  .header-top {
    display: flex; align-items: center; gap: 16px; margin-bottom: 8px;
  }
  .header-icon {
    width: 52px; height: 52px; border-radius: 12px;
    background: rgba(255,255,255,0.13);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.7rem; flex-shrink: 0;
  }
  .header-sub {
    font-size: 0.68rem; letter-spacing: 0.14em; font-weight: 700;
    color: #7dd3fc; text-transform: uppercase; margin-bottom: 3px;
  }
  h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.01em; }

  /* BUSCA */
  .search-wrap { position: relative; margin: 22px 0 0; }
  .search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    font-size: 1.1rem; pointer-events: none;
  }
  #busca {
    width: 100%; padding: 14px 14px 14px 46px;
    border-radius: 10px 10px 0 0; border: none;
    font-size: 0.95rem; background: #fff; color: #111;
    outline: none; box-shadow: 0 2px 16px rgba(0,0,0,0.18);
  }

  /* ABAS */
  .abas { display: flex; gap: 0; margin-top: 10px; }
  .aba {
    padding: 10px 22px; background: transparent;
    color: rgba(255,255,255,0.6); border: none;
    border-radius: 8px 8px 0 0; font-weight: 500;
    font-size: 0.85rem; cursor: pointer; transition: all 0.15s;
  }
  .aba.ativa { background: #f0f2f5; color: #1b3a5c; font-weight: 700; }

  /* CORPO */
  main { max-width: 900px; margin: 0 auto; padding: 24px 16px 48px; }

  /* FILTROS */
  .filtros { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
  .filtro-btn {
    padding: 6px 15px; border-radius: 99px;
    border: 1.5px solid #d1d5db; background: #fff;
    color: #374151; font-size: 0.78rem; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
  }
  .filtro-btn.ativo {
    background: #1b3a5c; color: #fff; border-color: #1b3a5c; font-weight: 700;
  }

  /* SEÇÃO TEMA */
  .secao { margin-bottom: 30px; }
  .secao-header {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; cursor: pointer; background: none; border: none;
    width: 100%; text-align: left;
  }
  .secao-icone { font-size: 1.25rem; }
  .secao-titulo { font-weight: 700; font-size: 1rem; color: #1b3a5c; }
  .secao-count {
    background: #e5e7eb; color: #374151;
    border-radius: 99px; font-size: 0.72rem;
    font-weight: 700; padding: 2px 10px;
  }
  .secao-toggle { margin-left: auto; color: #9ca3af; font-size: 0.8rem; }
  .secao-linha { height: 1px; background: #d1d5db; margin-bottom: 14px; }
  .secao-docs { display: flex; flex-direction: column; gap: 10px; }
  .secao-docs.fechado { display: none; }

  /* CARD */
  .card {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-left: 4px solid #1b3a5c;
    border-radius: 8px;
    padding: 14px 16px;
    display: flex; flex-direction: column; gap: 7px;
    transition: box-shadow 0.15s;
  }
  .card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.10); }
  .card-topo {
    display: flex; justify-content: space-between;
    align-items: flex-start; gap: 10px;
  }
  .card-titulo {
    font-weight: 600; font-size: 0.9rem;
    color: #111827; line-height: 1.4;
  }
  .card-meta { display: flex; gap: 7px; align-items: center; flex-shrink: 0; }
  .badge {
    font-size: 0.66rem; font-weight: 700;
    padding: 2px 8px; border-radius: 4px;
    color: #fff; text-transform: uppercase;
    letter-spacing: 0.04em; white-space: nowrap;
  }
  .ano { font-size: 0.74rem; color: #9ca3af; font-weight: 500; }
  .card-desc { font-size: 0.81rem; color: #6b7280; line-height: 1.5; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag {
    background: #f3f4f6; color: #374151;
    font-size: 0.68rem; padding: 2px 8px; border-radius: 99px;
  }
  .card-rodape { display: flex; justify-content: flex-end; margin-top: 4px; }
  .btn-abrir {
    display: inline-flex; align-items: center; gap: 6px;
    background: #1b3a5c; color: #fff;
    border: none; border-radius: 6px;
    padding: 7px 14px; font-size: 0.78rem; font-weight: 600;
    cursor: pointer; text-decoration: none; transition: background 0.15s;
  }
  .btn-abrir:hover { background: #22577a; }

  /* RESULTADO BUSCA */
  .resultado-info {
    font-size: 0.84rem; color: #6b7280; margin-bottom: 16px;
  }
  mark { background: #fef08a; border-radius: 2px; padding: 0 1px; }

  /* VAZIO */
  .vazio { text-align: center; color: #9ca3af; margin-top: 56px; font-size: 0.95rem; }

  footer {
    text-align: center; padding: 20px;
    font-size: 0.7rem; color: #9ca3af;
  }
</style>
</head>

// ── LÓGICA ────────────────────────────────────────────────────────────────────
let abaAtual = "temas";
let tipoFiltro = "Todos";

const tipos = ["Todos", ...new Set(DOCS.map(d => d.tipo))];

function urlArquivo(nome) {
  return BASE + encodeURIComponent(nome);
}

function highlight(texto, termo) {
  if (!termo) return texto;
  const re = new RegExp(`(${termo.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, "gi");
  return texto.replace(re, "<mark>$1</mark>");
}

function renderFiltros() {
  const el = document.getElementById("filtros");
  el.innerHTML = tipos.map(t =>
    `<button class="filtro-btn${tipoFiltro===t?' ativo':''}" onclick="setFiltro('${t}')">${t}</button>`
  ).join("");
}

function setFiltro(t) {
  tipoFiltro = t;
  renderFiltros();
  render();
}

function setAba(a) {
  abaAtual = a;
  document.getElementById("aba-temas").className = "aba" + (a==="temas"?" ativa":"");
  document.getElementById("aba-busca").className = "aba" + (a==="busca"?" ativa":"");
  render();
}

function onBusca() {
  const v = document.getElementById("busca").value.trim();
  if (v) setAba("busca"); else setAba("temas");
  render();
}

function docsFiltrados() {
  const termo = document.getElementById("busca").value.trim().toLowerCase();
  return DOCS.filter(d => {
    if (tipoFiltro !== "Todos" && d.tipo !== tipoFiltro) return false;
    if (!termo) return true;
    return (
      d.titulo.toLowerCase().includes(termo) ||
      d.desc.toLowerCase().includes(termo) ||
      d.tema.toLowerCase().includes(termo) ||
      d.tipo.toLowerCase().includes(termo) ||
      d.tags.some(t => t.toLowerCase().includes(termo)) ||
      String(d.ano).includes(termo)
    );
  });
}

function cardHTML(d, termo) {
  const cor = TIPO_COR[d.tipo] || "#374151";
  return `
  <div class="card" style="border-left-color:${cor}">
    <div class="card-topo">
      <span class="card-titulo">${highlight(d.titulo, termo)}</span>
      <div class="card-meta">
        <span class="badge" style="background:${cor}">${d.tipo}</span>
        <span class="ano">${d.ano}</span>
      </div>
    </div>
    <p class="card-desc">${highlight(d.desc, termo)}</p>
    <div class="card-tags">${d.tags.map(t=>`<span class="tag">#${t}</span>`).join("")}</div>
    <div class="card-rodape">
      <a class="btn-abrir" href="${urlArquivo(d.arquivo)}" target="_blank">📄 Abrir documento</a>
    </div>
  </div>`;
}

function render() {
  const termo = document.getElementById("busca").value.trim().toLowerCase();
  const docs = docsFiltrados();
  const el = document.getElementById("conteudo");

  // Atualiza label da aba de busca
  document.getElementById("aba-busca").textContent =
    `Resultado da Busca${termo ? ` (${docs.length})` : ""}`;

  if (abaAtual === "temas" && !termo) {
    // Agrupa por tema
    const mapa = {};
    docs.forEach(d => { if(!mapa[d.tema]) mapa[d.tema]=[]; mapa[d.tema].push(d); });
    if (Object.keys(mapa).length === 0) {
      el.innerHTML = `<p class="vazio">Nenhum documento encontrado.</p>`;
      return;
    }
    el.innerHTML = Object.entries(mapa).map(([tema, tDocs]) => `
      <div class="secao">
        <button class="secao-header" onclick="toggleSecao(this)">
          <span class="secao-icone">${TEMA_ICONE[tema]||"📄"}</span>
          <span class="secao-titulo">${tema}</span>
          <span class="secao-count">${tDocs.length}</span>
          <span class="secao-toggle">▲</span>
        </button>
        <div class="secao-linha"></div>
        <div class="secao-docs">${tDocs.map(d=>cardHTML(d,"")).join("")}</div>
      </div>`).join("");
  } else {
    if (docs.length === 0) {
      el.innerHTML = `<p class="vazio">Nenhum resultado encontrado para "<strong>${termo}</strong>".</p>`;
      return;
    }
    el.innerHTML = `
      <p class="resultado-info">${docs.length} documento${docs.length>1?"s":""} encontrado${docs.length>1?"s":""} para "<strong>${termo||"todos"}</strong>"</p>
      ${docs.map(d=>cardHTML(d,termo)).join("")}`;
  }
}

function toggleSecao(btn) {
  const docs = btn.parentElement.querySelector(".secao-docs");
  const tog = btn.querySelector(".secao-toggle");
  const fechado = docs.classList.toggle("fechado");
  tog.textContent = fechado ? "▼" : "▲";
}

// INIT
renderFiltros();
render();
</script>
